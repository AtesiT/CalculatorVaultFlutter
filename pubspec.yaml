name: calculator_vault
description: A fully functional calculator with a hidden secure vault.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  path_provider: ^2.1.3
  file_picker: ^8.0.0
  path: ^1.9.0
  uuid: ^4.4.0

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  shared_preferences: ^2.2.3

  crypto: ^3.0.3
  pointycastle: ^3.9.1
  flutter_secure_storage: ^9.2.2

  video_player: ^2.9.1
  video_thumbnail: ^0.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true